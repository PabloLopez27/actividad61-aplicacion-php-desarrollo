name: CI/CD Pipeline LAMP Docker

on:
  push:
    branches: [ "main" ] # Se activa al hacer push a la rama principal

jobs:
  # 1. TRABAJO DE INTEGRACIÓN CONTINUA (CI)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y subir imagen (Build & Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-lamp:latest

  # 2. TRABAJO DE DESPLIEGUE CONTINUO (CD)
  deploy:
    needs: build-and-push # Espera a que termine el anterior
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue en AWS vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Detener el contenedor anterior si existe
            docker stop web-lamp-container || true
            docker rm web-lamp-container || true
            
            # Limpiar imágenes antiguas (opcional para ahorrar espacio)
            docker image prune -f
            
            # Pull de la nueva imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/web-lamp:latest
            
            # Ejecución del contenedor
            docker run -d --name web-lamp-container -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/web-lamp:latest